<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2D6A4F" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0D1B14" media="(prefers-color-scheme: dark)" />
  <title>Dhikrullah — Daily Dhikr Companion</title>
  <meta name="description" content="Dhikrullah is a daily dhikr and dua companion app. Track your remembrance of Allah throughout the day." />

  <!-- Favicon / iOS / Android shortcut icon -->
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />

  <!-- Open Graph (iMessage, WhatsApp, Facebook, LinkedIn, Slack) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Dhikrullah" />
  <meta property="og:title" content="Dhikrullah — Daily Dhikr Companion" />
  <meta property="og:description" content="Your daily companion for the remembrance of Allah." />
  <meta property="og:url" content="https://www.dhikrullah.app/" />
  <meta property="og:image" content="https://www.dhikrullah.app/icon.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />
  <meta property="og:image:alt" content="Dhikrullah app icon" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Dhikrullah — Daily Dhikr Companion" />
  <meta name="twitter:description" content="Your daily companion for the remembrance of Allah." />
  <meta name="twitter:image" content="https://www.dhikrullah.app/icon.png" />
  <meta name="twitter:image:alt" content="Dhikrullah app icon" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            arabic: ['Amiri', 'serif'],
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --accent: #2D6A4F;
      --accent-light: #E8F5EE;
      --bg-top: #D4E8D4;
      --bg-mid: #F7F3ED;
      --bg-bottom: #E8F0E8;
      --glass-bg: rgba(255,255,255,0.55);
      --glass-border: rgba(255,255,255,0.85);
      --text-dark: #1A1A2E;
      --text-mid: #4A5568;
      --text-dim: #9AA5B4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #6FBF8F;
        --accent-light: rgba(111,191,143,0.18);
        --bg-top: #0D1B14;
        --bg-mid: #14241B;
        --bg-bottom: #0A1410;
        --glass-bg: rgba(255,255,255,0.06);
        --glass-border: rgba(255,255,255,0.12);
        --text-dark: #E8F0EC;
        --text-mid: #B0BFB7;
        --text-dim: #6E7C75;
      }
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      background: var(--bg-mid);
      color: var(--text-dark);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Full-screen gradient layer — fixed to viewport so it never seams */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 0%, var(--bg-top) 0%, transparent 55%),
        radial-gradient(circle at 100% 100%, var(--bg-bottom) 0%, transparent 50%),
        var(--bg-mid);
    }

    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      transition: transform 120ms ease, opacity 120ms ease, box-shadow 200ms ease;
      box-shadow: 0 4px 18px rgba(45,106,79,0.25);
    }
    @media (prefers-color-scheme: dark) {
      .btn-primary { box-shadow: 0 4px 18px rgba(111,191,143,0.2); }
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); opacity: 0.85; }

    .btn-glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-dark);
      transition: transform 120ms ease, background 200ms ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btn-glass:hover { transform: translateY(-1px); }
    .btn-glass:active { transform: translateY(0); }

    .text-mid { color: var(--text-mid); }
    .text-dim { color: var(--text-dim); }
    .accent    { color: var(--accent); }

    .title-white {
      color: #FFFFFF;
      text-shadow:
        0 2px 12px rgba(0,0,0,0.30),
        0 1px 2px rgba(0,0,0,0.40);
    }

    .app-icon {
      width: clamp(72px, 18vh, 104px);
      height: clamp(72px, 18vh, 104px);
      border-radius: 22px;
      box-shadow:
        0 12px 30px rgba(0,0,0,0.25),
        0 4px 10px rgba(0,0,0,0.15);
    }

    .app-title {
      font-size: clamp(34px, 7.5vh, 52px);
      font-weight: 700;
      letter-spacing: -0.6px;
      line-height: 1;
    }

    .ayah-arabic {
      font-family: 'Amiri', serif;
      font-size: clamp(20px, 3.4vh, 26px);
      line-height: 1.45;
    }

    .btn {
      padding: clamp(11px, 1.7vh, 14px) 18px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 500ms ease both; }
    .delay-1 { animation-delay: 70ms; }
    .delay-2 { animation-delay: 140ms; }
    .delay-3 { animation-delay: 210ms; }

  </style>
</head>

<body class="overflow-hidden relative">

  <div class="bg-layer" aria-hidden="true"></div>

  <main class="relative z-10 w-full max-w-md mx-auto px-5 flex flex-col items-center text-center"
        style="min-height: 100dvh; padding-top: clamp(12px, 2.5vh, 28px); padding-bottom: clamp(10px, 1.6vh, 18px); gap: clamp(10px, 2vh, 22px); justify-content: space-between;">

    <!-- App name / logo block -->
    <header class="fade-up flex flex-col items-center"
            style="gap: clamp(8px, 1.5vh, 14px); margin-top: clamp(4px, 2vh, 16px);">
      <img src="icon.png" alt="Dhikrullah app icon" class="app-icon" />
      <h1 class="app-title title-white">
        Dhikr<span class="accent" style="text-shadow: none;">ullah</span>
      </h1>
    </header>

    <!-- Ayah card -->
    <section class="fade-up delay-1 glass-card rounded-2xl w-full"
             style="padding: clamp(12px, 2vh, 18px);">
      <p class="ayah-arabic accent" style="margin-bottom: 6px;">
        فَاذْكُرُونِي أَذْكُرْكُمْ
      </p>
      <p class="text-mid italic" style="font-size: clamp(12px, 1.8vh, 14px); line-height: 1.45;">
        “So remember Me; I will remember you.”
      </p>
      <p class="text-dim" style="font-size: 11px; margin-top: 4px;">Qur'an 2:152</p>
    </section>

    <!-- Buttons -->
    <section class="fade-up delay-2 w-full flex flex-col"
             style="gap: clamp(8px, 1.4vh, 12px);">
      <a id="iosBtn" href="#" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.05 12.04a4.62 4.62 0 0 1 2.21-3.87 4.74 4.74 0 0 0-3.73-2c-1.57-.16-3.08.93-3.88.93-.82 0-2.04-.91-3.36-.88a4.96 4.96 0 0 0-4.18 2.55c-1.79 3.1-.45 7.69 1.28 10.21.86 1.24 1.88 2.62 3.23 2.57 1.3-.05 1.79-.83 3.36-.83 1.55 0 2.01.83 3.38.8 1.4-.02 2.28-1.24 3.14-2.5a11.07 11.07 0 0 0 1.43-2.91 4.5 4.5 0 0 1-2.88-4.07Zm-2.55-7.48a4.55 4.55 0 0 0 1.05-3.27 4.65 4.65 0 0 0-3.02 1.56 4.34 4.34 0 0 0-1.07 3.15 3.85 3.85 0 0 0 3.04-1.44Z"/>
        </svg>
        Download on App Store
      </a>

      <a id="androidBtn" href="#" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3.6 20.4 14.2 12 3.6 3.6c-.36.22-.6.6-.6 1.04v14.72c0 .44.24.82.6 1.04Zm12.04-6.93 2.5-1.45-12-6.9 9.5 8.35Zm0-3 2.5-1.44c.74.43.74 1.46 0 1.88l-2.5 1.43L12.97 12l2.67-1.53Zm0 7.94L6.14 19.32l12-6.9-2.5-1.45-9.5 8.35"/>
        </svg>
        Get it on Google Play
      </a>

      <a id="githubBtn" href="#" target="_blank" rel="noopener" class="btn btn-glass">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 .5a11.5 11.5 0 0 0-3.63 22.42c.57.1.78-.25.78-.55v-2.04c-3.2.7-3.88-1.37-3.88-1.37-.52-1.33-1.27-1.68-1.27-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.2 1.77 1.2 1.03 1.76 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.3-5.24-1.28-5.24-5.7 0-1.26.45-2.28 1.18-3.08-.12-.3-.51-1.47.11-3.06 0 0 .97-.31 3.18 1.17a11 11 0 0 1 5.78 0c2.2-1.48 3.17-1.17 3.17-1.17.63 1.59.23 2.76.12 3.06.73.8 1.18 1.82 1.18 3.08 0 4.42-2.7 5.4-5.27 5.69.41.35.77 1.04.77 2.1v3.12c0 .3.21.66.79.55A11.5 11.5 0 0 0 12 .5Z"/>
        </svg>
        Open Source on GitHub
      </a>

      <a id="contactBtn" href="mailto:dhikrullah.support@gmail.com" class="btn btn-glass">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="m3 7 9 6 9-6"/>
        </svg>
        Contact Us
      </a>
    </section>

    <footer class="fade-up delay-3 accent w-full"
            style="font-size: 11px; line-height: 1.55; opacity: 0.75; letter-spacing: 0.2px;">
      May Allah accept it from all who use it.
      <br/>
      <a href="poster.png" download style="text-decoration: underline;">Click here to download poster</a>
    </footer>
  </main>

  <script>
    // ─── Configure store links here once available ────────────────────────
    const URLS = {
      ios:     'https://apps.apple.com/gb/app/dhikrullah/id6767234911',
      android: 'https://play.google.com/store/apps/details?id=com.haroonaftab.dhikrullah',
      github:  'https://github.com/HaroonA01/Dhikrullah-app',
    };

    // Auto-redirect mobile users when real store URLs are configured.
    // While URLs are still '#', this stays inert by design.
    const AUTO_REDIRECT = true;
    const AUTO_REDIRECT_DELAY_MS = 1200;

    // Wire button hrefs from URLS map
    document.getElementById('iosBtn').href     = URLS.ios;
    document.getElementById('androidBtn').href = URLS.android;
    document.getElementById('githubBtn').href  = URLS.github;

    // Detect platform
    const ua = navigator.userAgent || navigator.vendor || '';
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isAndroid = /Android/i.test(ua);

    function isRealUrl(u) {
      return typeof u === 'string' && u.length > 1 && u !== '#';
    }

    if (AUTO_REDIRECT) {
      let target = null;
      if (isIOS && isRealUrl(URLS.ios)) target = URLS.ios;
      else if (isAndroid && isRealUrl(URLS.android)) target = URLS.android;

      if (target) {
        setTimeout(() => { window.location.replace(target); }, AUTO_REDIRECT_DELAY_MS);
      }
    }
  </script>
</body>
</html>
